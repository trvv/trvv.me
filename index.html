<!DOCTYPE html>

<style>
*, *::before, *::after {
	box-sizing: border-box;
	background-repeat: no-repeat;
	padding: 0;
	margin: 0;
	line-height: 0;
}

body {
	background-color: black;
	color: black;
	display: flex;
	margin: 0;
	padding: 0;
	max-width: 100cqw;
	overflow-x: hidden;
	scrollbar-gutter: stable;
	flex-wrap: wrap;
	cursor: not-allowed;
}

@media (prefers-color-scheme: dark) {
	body {
		background-color: black;
		color: white;
	}
}

img, video {
	max-width: 100%;
}

a {
	cursor: pointer;
}

video.globe {
	aspect-ratio: 1;
	object-fit: cover;
	max-width: 40vw;
}
</style>
